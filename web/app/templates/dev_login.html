{% extends "base.html" %}
{% block title %}Dev login{% endblock %}
{% block content %}

  <section class="panel narrow">
    <h1 style="margin-top:0;">Dev login</h1>
    <p class="hint">Temporary helper until real auth is wired up.</p>
    <form method="post">
      <label>
        Email
        <input name="email" type="email" placeholder="you@school.edu" required />
      </label>
      <label>
        Name <span class="hint">(optional)</span>
        <input name="name" type="text" placeholder="Your Name" />
      </label>
      <div class="actions">
        <button type="submit">Log in</button>
      </div>
    </form>
  </section>

{% endblock %}
