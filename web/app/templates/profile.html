{% extends "base.html" %}
{% block title %}Profile{% endblock %}
{% block content %}

  <section class="panel narrow">
    <h1 style="margin-top:0;">Your profile</h1>
    <form method="post">
      <label>
        Name
        <input name="name" type="text" value="{{ user.name or '' }}" />
      </label>
      <label>
        Email
        <input type="text" value="{{ user.email or 'unknown' }}" disabled />
      </label>
      <label>
        Tags <span class="hint">(comma-separated, e.g. tutoring, moving)</span>
        <input name="tags" type="text" value="{{ user.get('tags', []) | join(', ') }}" />
      </label>
      <div class="actions">
        <button type="submit">Save</button>
      </div>
    </form>
  </section>

{% endblock %}
