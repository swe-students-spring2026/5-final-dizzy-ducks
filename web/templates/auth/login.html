{% extends "base.html" %}
{% block title %}Log in | Dizzy Ducks{% endblock %}
{% block content %}
  <section class="panel narrow">
    <h1>Log in</h1>
    {% if errors %}
      <ul class="errors">
        {% for error in errors %}<li>{{ error }}</li>{% endfor %}
      </ul>
    {% endif %}
    <form method="post">
      <label>
        Email
        <input type="email" name="email" value="{{ values.email }}" required>
      </label>
      <label>
        Password
        <input type="password" name="password" required>
      </label>
      <button type="submit">Log in</button>
    </form>
    <p>
      Need an account? <a href="{{ url_for('auth.signup') }}">Sign up</a>.
    </p>
  </section>
{% endblock %}
