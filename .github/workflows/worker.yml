name: worker

on:
  push:
    branches: [main, master]
    paths:
      - "email-worker/**"
      - ".github/workflows/worker.yml"
  pull_request:
    paths:
      - "email-worker/**"
      - ".github/workflows/worker.yml"

jobs:
  test:
    name: Test (Python 3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: email-worker
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage
        working-directory: email-worker
        run: pytest tests/ --cov=email_worker --cov-report=term-missing --cov-fail-under=80

  docker:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push worker image
        uses: docker/build-push-action@v5
        with:
          context: ./email-worker
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/gigboard-worker:latest,${{ secrets.DOCKERHUB_USERNAME }}/gigboard-worker:${{ github.sha }}
