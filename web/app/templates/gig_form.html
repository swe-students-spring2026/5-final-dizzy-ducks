{% extends "base.html" %}
{% block title %}Post a gig{% endblock %}
{% block content %}
  <section class="panel">
    <div class="stack">
      <h1 style="margin:0;">Post a gig</h1>
      <p class="meta" style="margin:0;">Publish a short-term job for other students to apply to.</p>
    </div>
  </section>
  <section class="panel">
    {% if errors %}
      <ul class="errors">
        {% for error in errors %}<li>{{ error }}</li>{% endfor %}
      </ul>
    {% endif %}
    <form method="post">
      <label>
        Title
        <input name="title" value="{{ values.title }}" required>
      </label>
      <label>
        Category
        <select name="category" required>
          <option value="" {% if not values.category %}selected{% endif %}>Choose a category</option>
          {% for tag in job_tags %}
            <option value="{{ tag }}" {% if values.category == tag %}selected{% endif %}>{{ tag_labels[tag] }}</option>
          {% endfor %}
        </select>
      </label>
      <label>
        Pay
        <input name="pay"
               value="{{ values.pay }}"
               placeholder="$40 or $25/hr"
               required>
      </label>
      <label>
        Location
        <input name="location" value="{{ values.location }}" required>
      </label>
      <label>
        Date
        <input type="date" name="date" value="{{ values.date }}" required>
      </label>
      <label>
        Description
        <textarea name="description" rows="5" required>{{ values.description }}</textarea>
      </label>
      <div class="actions">
        <button type="submit">Post gig</button>
        <a href="{{ url_for('management.my_gigs') }}">Cancel</a>
      </div>
    </form>
  </section>
{% endblock %}
