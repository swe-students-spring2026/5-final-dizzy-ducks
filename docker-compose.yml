services:
  web:
    build: ./web
    ports:
      - "5001:5000"
    env_file:
      - ./web/.env
    volumes:
      - ./web:/app
    depends_on:
      - mongo

  worker:
    build: ./email-worker
    env_file:
      - ./email-worker/.env
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
